<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Tab Editor — Mock</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 32px 24px; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .meta { font-size: 13px; color: #888; margin-bottom: 24px; }
  .cursor-info { font-size: 12px; color: #aaa; font-family: monospace; margin-bottom: 16px; min-height: 18px; }
  .section { margin-bottom: 28px; }
  .section-label { display: inline-flex; align-items: center; font-size: 12px; font-weight: 500; background: #f1f0ea; border: 0.5px solid #d3d1c7; border-radius: 6px; padding: 3px 10px; margin-bottom: 10px; color: #5f5e5a; }
  .tab-grid-wrap { overflow-x: auto; }
  .tab-grid { display: inline-flex; flex-direction: column; border: 0.5px solid #d3d1c7; border-radius: 8px; overflow: hidden; }
  .string-row { display: flex; align-items: center; border-bottom: 0.5px solid #e8e7e0; }
  .string-row:last-child { border-bottom: none; }
  .string-label { width: 28px; min-width: 28px; text-align: center; font-size: 12px; font-weight: 500; color: #888; background: #f5f5f2; border-right: 0.5px solid #e0dfd8; padding: 6px 0; align-self: stretch; display: flex; align-items: center; justify-content: center; }
  .steps { display: flex; }
  .cell { width: 38px; min-width: 38px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-family: monospace; border-right: 0.5px solid #e8e7e0; cursor: pointer; position: relative; transition: background 0.08s; color: #1a1a1a; background: #fff; }
  .cell:last-child { border-right: none; }
  .cell:hover { background: #f5f5f2; }
  .cell.has-fret { background: #e6f1fb; }
  .cell.has-fret .fret-num { color: #185fa5; font-weight: 500; }
  .cell.cursor { outline: 2px solid #378add; outline-offset: -2px; z-index: 1; border-radius: 2px; }
  .fret-num { font-size: 14px; }
  .dash { color: #ccc; font-size: 10px; }
  .technique-badge { position: absolute; top: 2px; right: 3px; font-size: 9px; color: #185fa5; font-weight: 500; }
  .add-step-cell { width: 30px; min-width: 30px; height: 36px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 18px; cursor: pointer; border-bottom: 0.5px solid #e8e7e0; border-left: 0.5px solid #e0dfd8; background: #fff; transition: background 0.08s; }
  .add-step-cell:last-child { border-bottom: none; }
  .add-step-cell:hover { color: #888; background: #f5f5f2; }
  .hint-grid { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; font-size: 12px; color: #888; margin-top: 20px; max-width: 480px; }
  .hint-key { font-family: monospace; background: #f1f0ea; border: 0.5px solid #d3d1c7; border-radius: 4px; padding: 1px 7px; font-size: 11px; color: #333; white-space: nowrap; }
  .hint-desc { display: flex; align-items: center; color: #888; }
  h2 { font-size: 13px; font-weight: 500; color: #aaa; margin: 28px 0 12px; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>

<h1>夜に駆ける</h1>
<p class="meta">YOASOBI · EADGBe · チューニング標準</p>
<div id="cursor-info" class="cursor-info">クリックまたは矢印キーで操作</div>

<div id="app"></div>

<h2>キーボード操作</h2>
<div class="hint-grid">
  <span class="hint-key">← →</span><span class="hint-desc">ステップ移動</span>
  <span class="hint-key">↑ ↓</span><span class="hint-desc">弦移動（1弦〜6弦）</span>
  <span class="hint-key">0〜9</span><span class="hint-desc">フレット番号入力（2桁対応: 12など）</span>
  <span class="hint-key">Del</span><span class="hint-desc">フレットをクリア</span>
  <span class="hint-key">Tab</span><span class="hint-desc">次のステップへ</span>
  <span class="hint-key">h p b s v</span><span class="hint-desc">テクニック（hammer / pull / bend / slide / vibrato）トグル</span>
</div>

<script>
const STRING_NAMES = ['e','B','G','D','A','E'];

const sections = {
  intro: {
    id: 'intro',
    label: 'イントロ',
    steps: [
      { strings: {1:null,2:null,3:null,4:null,5:0,6:null} },
      { strings: {1:null,2:null,3:null,4:null,5:2,6:null} },
      { strings: {1:null,2:null,3:null,4:2,5:null,6:null} },
      { strings: {1:null,2:null,3:null,4:4,5:null,6:null} },
      { strings: {1:null,2:null,3:null,4:null,5:0,6:null} },
      { strings: {1:null,2:1,3:0,4:2,5:3,6:null} },
      { strings: {1:0,2:1,3:0,4:2,5:3,6:null} },
      { strings: {1:null,2:null,3:2,4:null,5:null,6:null}, techniques:{3:'h'} },
    ]
  },
  sabi: {
    id: 'sabi',
    label: 'サビ',
    steps: [
      { strings: {1:0,2:1,3:0,4:2,5:3,6:null} },
      { strings: {1:null,2:3,3:2,4:null,5:null,6:null} },
      { strings: {1:null,2:null,3:null,4:5,5:5,6:null} },
      { strings: {1:null,2:null,3:4,4:5,5:null,6:null} },
      { strings: {1:null,2:null,3:null,4:null,5:3,6:3} },
      { strings: {1:null,2:null,3:null,4:2,5:null,6:null} },
    ]
  }
};

const sectionOrder = ['intro', 'sabi'];
let cursor = { sectionId: 'intro', step: 0, string: 5 };
let inputBuffer = '';
let bufferTimer = null;

function updateCursorInfo() {
  const sec = sections[cursor.sectionId];
  const sName = STRING_NAMES[cursor.string - 1];
  const step = sec.steps[cursor.step];
  const fret = step.strings[cursor.string];
  const fretStr = (fret !== null && fret !== undefined) ? `フレット ${fret}` : '(空)';
  document.getElementById('cursor-info').textContent =
    `${sec.label} · ステップ ${cursor.step + 1} · ${cursor.string}弦 (${sName}) · ${fretStr}`;
}

function buildGrid(secId) {
  const sec = sections[secId];
  const grid = document.createElement('div');
  grid.className = 'tab-grid';
  grid.id = 'grid-' + secId;

  STRING_NAMES.forEach((name, si) => {
    const strNum = si + 1;
    const row = document.createElement('div');
    row.className = 'string-row';

    const label = document.createElement('div');
    label.className = 'string-label';
    label.textContent = name;
    row.appendChild(label);

    const stepsEl = document.createElement('div');
    stepsEl.className = 'steps';

    sec.steps.forEach((step, stepIdx) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (cursor.sectionId === secId && cursor.step === stepIdx && cursor.string === strNum) {
        cell.classList.add('cursor');
      }
      const val = step.strings[strNum];
      if (val !== null && val !== undefined) {
        cell.classList.add('has-fret');
        const num = document.createElement('span');
        num.className = 'fret-num';
        num.textContent = val;
        cell.appendChild(num);
        if (step.techniques && step.techniques[strNum]) {
          const badge = document.createElement('span');
          badge.className = 'technique-badge';
          badge.textContent = step.techniques[strNum];
          cell.appendChild(badge);
        }
      } else {
        const dash = document.createElement('span');
        dash.className = 'dash';
        dash.textContent = '·';
        cell.appendChild(dash);
      }
      cell.addEventListener('click', () => {
        cursor = { sectionId: secId, step: stepIdx, string: strNum };
        updateCursorInfo();
        render();
      });
      stepsEl.appendChild(cell);
    });

    row.appendChild(stepsEl);

    // +ボタン列
    const addCell = document.createElement('div');
    addCell.className = 'add-step-cell';
    if (si === 0) {
      addCell.textContent = '+';
      addCell.title = 'ステップを追加';
      addCell.addEventListener('click', () => {
        sec.steps.push({ strings: {1:null,2:null,3:null,4:null,5:null,6:null} });
        cursor = { sectionId: secId, step: sec.steps.length - 1, string: cursor.string };
        updateCursorInfo();
        render();
      });
    }
    row.appendChild(addCell);
    grid.appendChild(row);
  });

  return grid;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  sectionOrder.forEach(secId => {
    const sec = sections[secId];
    const wrapper = document.createElement('div');
    wrapper.className = 'section';
    const labelEl = document.createElement('div');
    labelEl.className = 'section-label';
    labelEl.textContent = sec.label;
    wrapper.appendChild(labelEl);
    const wrap = document.createElement('div');
    wrap.className = 'tab-grid-wrap';
    wrap.appendChild(buildGrid(secId));
    wrapper.appendChild(wrap);
    app.appendChild(wrapper);
  });
}

function clearBuffer() {
  clearTimeout(bufferTimer);
  inputBuffer = '';
}

document.addEventListener('keydown', e => {
  const keys = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Delete','Backspace','Tab'];
  const isNum = /^\d$/.test(e.key);
  const isTech = ['h','p','b','s','v'].includes(e.key);
  if (!keys.includes(e.key) && !isNum && !isTech) return;
  e.preventDefault();

  const steps = sections[cursor.sectionId].steps;

  if (e.key === 'ArrowRight' || e.key === 'Tab') {
    clearBuffer();
    cursor.step = Math.min(cursor.step + 1, steps.length - 1);
  } else if (e.key === 'ArrowLeft') {
    clearBuffer();
    cursor.step = Math.max(cursor.step - 1, 0);
  } else if (e.key === 'ArrowUp') {
    clearBuffer();
    cursor.string = Math.max(cursor.string - 1, 1);
  } else if (e.key === 'ArrowDown') {
    clearBuffer();
    cursor.string = Math.min(cursor.string + 1, 6);
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    clearBuffer();
    steps[cursor.step].strings[cursor.string] = null;
    if (steps[cursor.step].techniques) {
      delete steps[cursor.step].techniques[cursor.string];
    }
  } else if (isNum) {
    inputBuffer += e.key;
    clearTimeout(bufferTimer);
    steps[cursor.step].strings[cursor.string] = parseInt(inputBuffer, 10);
    bufferTimer = setTimeout(() => {
      cursor.step = Math.min(cursor.step + 1, steps.length - 1);
      inputBuffer = '';
      updateCursorInfo();
      render();
    }, 600);
  } else if (isTech) {
    const step = steps[cursor.step];
    if (!step.techniques) step.techniques = {};
    step.techniques[cursor.string] = step.techniques[cursor.string] === e.key ? null : e.key;
  }

  updateCursorInfo();
  render();
});

render();
updateCursorInfo();
</script>
</body>
</html>
